<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkLedger - Backlink Exchange and SEO Ops Manager</title>
<meta name="description" content="Internal tool to manage backlink exchanges, outreach, link-health checks, and GEO/AI-search visibility.">
<meta name="theme-color" content="#0A1A4F">
<meta name="robots" content="noindex,nofollow">
<meta property="og:title" content="LinkLedger">
<meta property="og:description" content="Backlink exchange and SEO operations manager.">
<meta property="og:image" content="/logo-512.png">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
  :root{
    --navy:#0A1A4F; --navy-2:#13205c; --blue:#4D8BF5; --blue-600:#2f6fe0;
    --ink:#0f1525; --muted:#5f7090; --line:#e6e9f0; --bg:#f5f7fb; --card:#fff;
    --ok:#15a05a; --warn:#c98a00; --bad:#d23b3b; --chip:#eef2fb;
    --radius:12px; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--blue-600);text-decoration:none}
  .hidden{display:none!important}
  /* layout */
  #app{display:flex;min-height:100vh}
  .sidebar{width:248px;flex:0 0 248px;background:var(--navy);color:#cdd6ee;display:flex;flex-direction:column;transition:width .18s ease;position:sticky;top:0;height:100vh;overflow:auto}
  .sidebar.collapsed{width:64px;flex-basis:64px}
  .sidebar.collapsed .nav-label,.sidebar.collapsed .brand-text,.sidebar.collapsed .nav-group-title{display:none}
  .brand{display:flex;align-items:center;gap:10px;padding:16px 16px;color:#fff}
  .brand img{width:30px;height:30px}
  .brand-text{font-weight:700;font-size:16px;letter-spacing:.2px}
  .brand-text span{color:var(--blue)}
  .nav-group{padding:6px 10px}
  .nav-group-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#7e8cc0;padding:10px 8px 4px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;color:#cdd6ee;cursor:pointer;font-weight:500}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav-item.active{background:var(--blue);color:#fff}
  .nav-item svg{width:18px;height:18px;flex:0 0 18px}
  .collapse-btn{margin:10px 10px 6px;display:flex;align-items:center;gap:8px;color:#9aa7d4;cursor:pointer;padding:8px 10px;border-radius:8px}
  .collapse-btn:hover{background:rgba(255,255,255,.06);color:#fff}
  .credit{display:flex;align-items:center;gap:7px;padding:10px 14px;margin-top:auto;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#8e9cc8;letter-spacing:.2px}
  .credit img{height:16px;width:auto;display:block;filter:brightness(0) invert(1);opacity:.85}
  .sidebar.collapsed .credit{justify-content:center;padding:10px 4px}
  .sidebar.collapsed .credit .credit-label{display:none}
  .credit-login{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:22px;font-size:11.5px;color:var(--muted)}
  .credit-login img{height:16px;width:auto;display:block}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topstrip{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .topstrip h1{font-size:17px;margin:0;font-weight:650}
  .topstrip .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .bell{position:relative;cursor:pointer;color:var(--muted)}
  .bell .dot{position:absolute;top:-3px;right:-3px;background:var(--bad);color:#fff;border-radius:10px;font-size:10px;padding:0 5px;line-height:16px}
  .content{padding:22px;max-width:1180px;width:100%;margin:0 auto}
  /* components */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:16px}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(4,1fr)}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{cursor:pointer}
  .kpi .label{color:var(--muted);font-size:12.5px;font-weight:500}
  .kpi .val{font-size:26px;font-weight:700;margin-top:4px}
  .kpi .delta{font-size:12px;font-weight:600}
  .delta.up{color:var(--ok)} .delta.down{color:var(--bad)}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .between{justify-content:space-between}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 12px;border-radius:9px;font-weight:600;cursor:pointer;font-size:13px}
  .btn:hover{background:#f4f6fb}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.primary:hover{background:var(--blue-600)}
  .btn.sm{padding:5px 9px;font-size:12px}
  .btn.danger{color:var(--bad);border-color:#f0c8c8}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  input,select,textarea{font:inherit;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#fff;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(77,139,245,.16)}
  label.fld{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field{margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:10px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:10px 10px;border-bottom:1px solid #eef1f7;vertical-align:middle}
  tr:hover td{background:#fafbff}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip);color:#34406b;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent}
  .chip.active{background:var(--blue);color:#fff}
  .badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 9px;font-size:11.5px;font-weight:700}
  .b-live{background:#e3f6ec;color:var(--ok)} .b-pending{background:#fef3da;color:var(--warn)}
  .b-completed{background:#e7eefc;color:var(--blue-600)} .b-gone,.b-rejected,.b-missing{background:#fbe6e6;color:var(--bad)}
  .b-alive{background:#e3f6ec;color:var(--ok)} .b-unverifiable{background:#eef1f7;color:var(--muted)}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:9px 14px;cursor:pointer;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--navy);border-bottom-color:var(--blue)}
  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:34px 16px}
  .empty svg{width:34px;height:34px;opacity:.4;margin-bottom:8px}
  .bar{height:9px;background:#eef1f7;border-radius:6px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--blue)}
  .toast{position:fixed;bottom:18px;right:18px;background:var(--navy);color:#fff;padding:11px 16px;border-radius:10px;box-shadow:0 8px 24px rgba(10,26,79,.35);z-index:100;font-weight:600;font-size:13px}
  .toast.bad{background:var(--bad)}
  /* modal + drawer */
  .overlay{position:fixed;inset:0;background:rgba(15,21,37,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}
  .modal{background:#fff;border-radius:14px;max-width:520px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(10,26,79,.35)}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:94vw;background:#fff;box-shadow:-12px 0 40px rgba(10,26,79,.2);z-index:60;overflow:auto;animation:slideIn .2s ease}
  @keyframes slideIn{from{transform:translateX(28px);opacity:.4}to{transform:none;opacity:1}}
  .modal .hd,.drawer .hd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
  .x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
  /* login */
  .login-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
  @media(max-width:820px){.login-wrap{grid-template-columns:1fr}.login-brand{display:none}}
  .login-brand{background:linear-gradient(150deg,var(--navy),#1b2f7a);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .login-brand img{width:64px;height:64px}
  .login-brand h2{font-size:26px;margin:0;max-width:360px;line-height:1.25}
  .login-form{display:flex;align-items:center;justify-content:center;padding:32px}
  .login-form .box{width:100%;max-width:340px}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .right{text-align:right} .center{text-align:center} .nowrap{white-space:nowrap}
  .small{font-size:12px}

  /* 3D / motion polish */
  .card{transition:transform .18s cubic-bezier(.2,.7,.2,1),box-shadow .18s ease}
  .kpi:hover,.card:hover{transform:translateY(-3px)}
  .kpi:hover{box-shadow:0 14px 34px -16px rgba(20,26,82,.45)}
  .brand span{background:linear-gradient(90deg,var(--blue),#7aa8ff);-webkit-background-clip:text;background-clip:text}
  @keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  .grid.kpis>*{animation:pop .45s cubic-bezier(.2,.7,.2,1) both}
  .grid.kpis>*:nth-child(2){animation-delay:.05s}.grid.kpis>*:nth-child(3){animation-delay:.1s}.grid.kpis>*:nth-child(4){animation-delay:.15s}
  .platform{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:12px;background:#fff;transition:transform .18s ease,box-shadow .18s ease}
  .platform:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .platform .pi{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:700;flex:0 0 40px}

  /* ---- UI/UX polish pass (#19) ---- */
  .content{animation:fadeUp .34s cubic-bezier(.2,.7,.2,1) both}
  .topstrip{backdrop-filter:saturate(1.4) blur(8px);background:rgba(255,255,255,.86);box-shadow:0 1px 0 rgba(16,24,40,.04)}
  .topstrip h1{letter-spacing:-.2px}
  .nav-item{position:relative}
  .nav-item.active::before{content:'';position:absolute;left:-10px;top:8px;bottom:8px;width:3px;border-radius:3px;background:#fff;opacity:.9}
  .sidebar{box-shadow:inset -1px 0 0 rgba(255,255,255,.04)}
  .btn{transition:transform .12s ease,background .15s ease,box-shadow .15s ease}
  .btn:active{transform:translateY(1px)}
  .btn.primary{box-shadow:0 6px 16px -8px rgba(51,85,255,.6)}
  .card{border-radius:14px}
  .kpi{perspective:600px}
  .kpi .val{letter-spacing:-.5px}
  th{position:sticky;top:0;background:#fff;z-index:1}
  .badge{letter-spacing:.2px}
  .chip{transition:transform .12s ease,background .15s ease}
  .chip:hover{transform:translateY(-1px)}
  .empty{border:1px dashed var(--line);border-radius:12px;background:#fcfdff}
  ::selection{background:rgba(77,139,245,.22)}
  input,select,textarea{transition:border-color .15s ease,box-shadow .15s ease}
  .modal,.drawer{animation:pop .26s cubic-bezier(.2,.7,.2,1) both}
  a.nav-item,.nav-item{user-select:none}
  /* gentle gradient wash on main bg for depth */
  body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(900px 380px at 78% -8%,rgba(77,139,245,.10),transparent 60%);z-index:-1}
  /* respect users who prefer reduced motion (accessibility) */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
    .kpi:hover,.card:hover,.platform:hover,.chip:hover{transform:none}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
/* ============================ helpers ============================ */
function $(tag, attrs){
  var e = document.createElement(tag);
  var kids = Array.prototype.slice.call(arguments, 2);
  if (attrs) for (var k in attrs){
    var v = attrs[k];
    if (v == null) continue;
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.indexOf('on') === 0 && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v === false) { /* skip */ }
    else e.setAttribute(k, v);
  }
  (function add(list){
    for (var i=0;i<list.length;i++){
      var kid = list[i];
      if (kid == null || kid === false) continue;
      if (Array.isArray(kid)) { add(kid); continue; }
      e.appendChild((typeof kid === 'string' || typeof kid === 'number') ? document.createTextNode(String(kid)) : kid);
    }
  })(kids);
  return e;
}
function clr(el){ while(el.firstChild) el.removeChild(el.firstChild); return el; }
function dash(v){ return (v===null||v===undefined||v==='') ? '-' : v; }
function fmtN(n){ if(n==null||n==='') return '-'; n=Number(n); if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'K'; return String(Math.round(n)); }

var ICONS = {
  dashboard:'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z',
  geo:'M12 2a10 10 0 100 20 10 10 0 000-20zm0 0c2.5 2.5 4 6 4 10s-1.5 7.5-4 10m0-20C9.5 4.5 8 8 8 12s1.5 7.5 4 10M2 12h20',
  link:'M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.71-1.71',
  swap:'M7 16l-4-4 4-4M3 12h13M17 8l4 4-4 4M21 12H8',
  target:'M12 2a10 10 0 100 20 10 10 0 000-20zm0 4a6 6 0 100 12 6 6 0 000-12zm0 4a2 2 0 100 4 2 2 0 000-4z',
  report:'M3 3v18h18M7 14l4-4 3 3 5-6',
  health:'M3 12h4l2 6 4-14 2 8h6',
  pitch:'M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z',
  mail:'M4 4h16v16H4zM4 6l8 6 8-6',
  in:'M16 8a6 6 0 016 6v6h-4v-6a2 2 0 00-4 0v6h-4v-12h4v2a4 4 0 014-4zM2 9h4v12H2zM4 2a2 2 0 110 4 2 2 0 010-4z',
  tools:'M14 7a4 4 0 01-5 5l-6 6 2 2 6-6a4 4 0 005-5l-2 2-2-2 2-2z',
  bell:'M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0',
  users:'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75',
  menu:'M3 12h18M3 6h18M3 18h18', trash:'M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14', plus:'M12 5v14M5 12h14',
  search:'M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4-4'
};
function icon(name){
  var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('fill','none'); s.setAttribute('stroke','currentColor');
  s.setAttribute('stroke-width','2'); s.setAttribute('stroke-linecap','round'); s.setAttribute('stroke-linejoin','round');
  var p = document.createElementNS('http://www.w3.org/2000/svg','path'); p.setAttribute('d', ICONS[name]||ICONS.dashboard); s.appendChild(p);
  return s;
}
var LOGO_SVG = '<img src="/logo.png" width="30" height="30" alt="LinkLedger" style="display:block;object-fit:contain">';

/* ============================ state + api ============================ */
var state = {
  token: localStorage.getItem('ll_token') || null,
  user: null,
  page: 'dashboard',
  collapsed: localStorage.getItem('ll_collapsed') === '1',
  reminders: 0,
  geoTab: 'overview', blTab: 'mapper'
};
function toast(msg, bad){
  var t = $('div',{class:'toast'+(bad?' bad':'')}, msg); document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2600);
}
async function api(path, opts){
  opts = opts || {};
  var headers = Object.assign({'content-type':'application/json'}, opts.headers||{});
  if (state.token) headers.authorization = 'Bearer ' + state.token;
  var r = await fetch('/api/'+path, { method: opts.method||'GET', headers: headers, body: opts.body?JSON.stringify(opts.body):undefined });
  var data = null; try { data = await r.json(); } catch(e){}
  if (!r.ok) { var msg = (data&&data.error)||('HTTP '+r.status); if (r.status===401){ logout(); } throw new Error(msg); }
  return data;
}
function logout(){ state.token=null; state.user=null; localStorage.removeItem('ll_token'); renderLogin(); }

/* ============================ login ============================ */
function renderLogin(){
  var root = clr(document.getElementById('root'));
  var email = $('input',{type:'email',value:'',placeholder:'you@company.com'});
  var pass = $('input',{type:'password',placeholder:'Your password'});
  var err = $('div',{class:'small',style:{color:'var(--bad)',minHeight:'18px',marginBottom:'8px'}});
  var btn = $('button',{class:'btn primary',style:{width:'100%'}}, 'Sign in');
  var mode = 'login';
  var LABELS = {
    login:    { title:'Welcome back',   subtitle:'Sign in to LinkLedger.',        btn:'Sign in',       toggle:'New here? Create an account' },
    register: { title:'Create account', subtitle:'Set up your LinkLedger access.', btn:'Create account', toggle:'Have an account? Sign in' }
  };
  function applyMode(){
    var L = LABELS[mode];
    title.textContent = L.title;
    subtitle.textContent = L.subtitle;
    clr(btn).appendChild(document.createTextNode(L.btn));
    toggle.textContent = L.toggle;
    err.textContent = '';
  }
  async function submit(){
    err.textContent=''; btn.disabled=true; clr(btn).appendChild($('span',{class:'spin'}));
    try{
      var path = mode==='login'?'auth/login':'auth/register';
      var d = await api(path,{method:'POST',body:{email:email.value.trim(),password:pass.value,name:email.value.split('@')[0]}});
      state.token=d.token; state.user=d.user; localStorage.setItem('ll_token',d.token); renderApp();
    }catch(e){ err.textContent=e.message; btn.disabled=false; clr(btn).appendChild(document.createTextNode(LABELS[mode].btn)); }
  }
  btn.addEventListener('click',submit);
  pass.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });
  var toggle = $('a',{href:'#',style:{cursor:'pointer'}}, LABELS.login.toggle);
  toggle.addEventListener('click',function(ev){ ev.preventDefault(); mode = mode==='login'?'register':'login'; applyMode(); });
  var title = $('h1',{style:{fontSize:'22px',margin:'0 0 4px'}}, LABELS.login.title);
  var subtitle = $('div',{class:'muted',style:{marginBottom:'20px'}}, LABELS.login.subtitle);
  root.appendChild($('div',{class:'login-wrap'},
    $('div',{class:'login-brand'},
      $('div',{html:LOGO_SVG.replace('width="30" height="30"','width="64" height="64"')}),
      $('h2',null,'One ledger for every backlink, pitch, and AI-search win.'),
      $('div',{class:'muted',style:{color:'#b9c4ec',maxWidth:'360px'}}, 'Exchanges, outreach, link-health checks, and GEO visibility - real data, shared by your team.')
    ),
    $('div',{class:'login-form'}, $('div',{class:'box'},
      $('div',{html:LOGO_SVG,style:{marginBottom:'12px'}}),
      title,
      subtitle,
      $('div',{class:'field'}, $('label',{class:'fld'},'Email'), email),
      $('div',{class:'field'}, $('label',{class:'fld'},'Password'), pass),
      err, btn,
      $('div',{class:'center small muted',style:{marginTop:'14px'}}, toggle),
      $('div',{class:'credit-login'}, $('span',null,'Designed by'), $('img',{src:'/solguruz-logo.png',alt:'SolGuruz'}))
    ))
  ));
  applyMode();
}
/* ============================ app shell + nav ============================ */
var NAV = [
  {group:'Overview', items:[['dashboard','Dashboard','dashboard'],['geo','GEO / AI Visibility','geo']]},
  {group:'Backlinks', items:[['backlinks','Backlinks Hub','link'],['exchanges','Exchanges','swap'],['prospects','Prospects','target']]},
  {group:'Reports', items:[['analysis','Backlink Analysis','report'],['health','Link Health','health']]},
  {group:'Outreach', items:[['pitch','Pitch Pipeline','pitch'],['email','Email Sender','mail'],['linkedin','LinkedIn Follow-ups','in']]},
  {group:'Tools', items:[['tools','SEO Tools','tools']]},
  {group:'Workspace', items:[['reminders','Reminders','bell'],['members','Members','users'],['account','My Account','users']]}
];
var PAGE_META = {
  dashboard:['Dashboard','Backlink program at a glance'],
  geo:['GEO / AI Visibility','Search and AI-engine visibility'],
  backlinks:['Backlinks Hub','Map, acquire, reclaim, and verify links'],
  exchanges:['Exchanges','Every link record in one place'],
  prospects:['Prospects','Domains worth pursuing'],

function readFileSmart(file){
  return new Promise(function(resolve,reject){
    var fr=new FileReader();
    fr.onload=function(){
      var buf=new Uint8Array(fr.result);
      // UTF-16 BOM detection
      if(buf.length>=2 && ((buf[0]===0xFF&&buf[1]===0xFE)||(buf[0]===0xFE&&buf[1]===0xFF))){
        try{ resolve({text:new TextDecoder(buf[0]===0xFF?'utf-16le':'utf-16be').decode(buf),ext:ext(file.name)}); return; }catch(e){}
      }
      resolve({text:new TextDecoder('utf-8').decode(buf),ext:ext(file.name)});
    };
    fr.onerror=reject; fr.readAsArrayBuffer(file);
  });
}
function ext(n){ var m=/\.([a-z0-9]+)$/i.exec(n||''); return m?m[1].toLowerCase():''; }
function parseDelimited(text){
  var delim = (text.indexOf('\t')>=0 && (text.split('\t').length>text.split(',').length))?'\t':',';
  var rows=[]; var i=0,field='',row=[],inq=false;
  while(i<text.length){ var c=text[i];
    if(inq){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inq=false; } else field+=c; }
    else { if(c==='"') inq=true; else if(c===delim){ row.push(field);field=''; } else if(c==='\n'){ row.push(field);rows.push(row);row=[];field=''; } else if(c==='\r'){} else field+=c; }
    i++;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.some(function(x){return String(x).trim()!=='';}); });
}
function loadSheetJS(){
  return new Promise(function(resolve,reject){
    if(window.XLSX) return resolve(window.XLSX);
    var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){ resolve(window.XLSX); }; s.onerror=function(){ reject(new Error('Could not load XLSX parser. Export the sheet as CSV instead.')); };
    document.head.appendChild(s);
  });
}
async function fileToRows(file){
  var e=ext(file.name);
  if(e==='xlsx'||e==='xls'){ var XLSX=await loadSheetJS(); var data=new Uint8Array(await file.arrayBuffer()); var wb=XLSX.read(data,{type:'array'}); var ws=wb.Sheets[wb.SheetNames[0]]; return XLSX.utils.sheet_to_json(ws,{header:1,defval:''}); }

}

// OAuth tools: a Connect button starts the authorize flow.
// connect = {url:'google/auth-url?for=gsc'} -> GET that endpoint, then redirect to the returned url.
// Key tools: env = ['AHREFS_API_KEY', ...] -> show which env vars to set in Render.
function platformCard(name,color,abbr,st,opts){
  opts = opts || {};
  var isConnected = !!(st && st.connected);
  var label = !st ? 'Not available' : st.connected ? 'Connected' : st.configured ? 'Configured' : 'Not configured';
  var cls = st && st.connected ? 'b-live' : (st && st.configured ? 'b-pending' : 'b-unverifiable');
  var foot = $('div',{style:{marginTop:'8px'}});

  // OAuth: configured but not yet connected -> offer a real Connect button.
  if (opts.connect && st && st.configured && !st.connected) {
    var cbtn = $('button',{class:'btn primary sm'}, 'Connect ' + (opts.connectLabel||name));
    cbtn.addEventListener('click', async function(){
      cbtn.disabled = true; var old = cbtn.textContent; cbtn.textContent = 'Opening...';
      try { var u = await api(opts.connect); window.location.href = u.url; }
      catch(e){ cbtn.disabled = false; cbtn.textContent = old; foot.appendChild($('div',{class:'small',style:{color:'var(--bad)',marginTop:'6px'}}, e.message)); }
    });
    foot.appendChild(cbtn);
  }
  // OAuth: not configured -> tell them which env vars unlock the Connect button.
  else if (opts.connect && (!st || !st.configured)) {
    foot.appendChild(envHint(opts.env, 'Add in Render, then Connect appears'));
  }
  // Key tools: not configured -> show env var(s) to add in Render.
  else if (opts.env && (!st || !st.configured)) {
    foot.appendChild(envHint(opts.env, 'Add in Render to activate'));
  }
  // Anything already connected/configured with nothing further to do.
  else if (st && (st.connected || st.configured)) {
    foot.appendChild($('div',{class:'small muted',style:{marginTop:'2px'}}, st.connected ? 'Active and authorized.' : 'Active.'));
  }

  // Connected badge gets a checkmark so connected platforms are unmistakable.
  var badge = isConnected
    ? $('span',{class:'badge b-live',style:{display:'inline-flex',alignItems:'center',gap:'4px'}},
        $('span',{html:'<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'}),
        'Connected')
    : $('span',{class:'badge '+cls}, label);

  var cardStyle = {alignItems:'flex-start'};
  if (isConnected) { cardStyle.borderLeft = '3px solid var(--ok)'; }

  return $('div',{class:'platform',style:cardStyle},
    $('div',{class:'pi',style:{background:color}}, abbr),
    $('div',{style:{flex:1}},
      $('div',{style:{fontWeight:600}}, name),
      badge,
      foot) );
}
function envHint(vars, caption){
  vars = vars || [];
  var wrap = $('div',{style:{marginTop:'6px'}});
  wrap.appendChild($('div',{class:'small muted',style:{marginBottom:'4px'}}, caption));
  vars.forEach(function(v){
    var row = $('div',{class:'row between',style:{gap:'6px',marginBottom:'4px'}});
    var code = $('code',{style:{fontSize:'11px',background:'rgba(0,0,0,.06)',padding:'2px 6px',borderRadius:'4px',overflow:'hidden',textOverflow:'ellipsis'}}, v);
    var copy = $('button',{class:'btn sm',title:'Copy variable name'}, 'Copy');
    copy.addEventListener('click', function(){
      navigator.clipboard.writeText(v).then(function(){ var t=copy.textContent; copy.textContent='Copied'; setTimeout(function(){copy.textContent=t;},1200); });
    });
    row.appendChild(code); row.appendChild(copy); wrap.appendChild(row);
  });
  return wrap;
}
